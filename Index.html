<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StableYield Radar | Lending + Bridges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0c10; font-family: 'Inter', system-ui, sans-serif; }
        .terminal-card { background: #0f1117; border: 1px solid #1e293b; border-radius: 1rem; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        .badge-negative { background: #064e3b; color: #a7f3d0; font-weight: bold; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 999px; }
        .risk-low { background-color: #14532d; color: #86efac; }
        .risk-medium { background-color: #854d0e; color: #fde047; }
        .risk-high { background-color: #7f1a1a; color: #fecaca; }
        .table-row:hover { background-color: #1a1e2a; cursor: pointer; transition: 0.1s; }
        .modal-bg { background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e2e; }
        ::-webkit-scrollbar-thumb { background: #2dd4bf; border-radius: 8px; }
        .tab-active { border-bottom: 2px solid #2dd4bf; color: #2dd4bf; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #9ca3af; }
        .hidden { display: none; }
    </style>
</head>
<body class="text-gray-200">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-6">
        <div class="flex flex-wrap justify-between items-center mb-4 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">StableYield Radar</h1>
                <p class="text-gray-400 text-sm mt-1">Custo real de capital • Empréstimos, Pontes e Agregadores</p>
            </div>
            <div class="flex gap-3 mt-2 sm:mt-0">
                <button id="exportCsvBtn" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><i class="fas fa-download"></i> CSV</button>
                <button id="proModeBtn" class="bg-cyan-950 hover:bg-cyan-900 border border-cyan-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><i class="fas fa-crown text-yellow-500"></i> Modo Pro</button>
            </div>
        </div>

        <div class="flex gap-6 border-b border-gray-800 mb-6">
            <button id="tabLending" class="tab-active pb-2 font-semibold">📊 Lending Radar</button>
            <button id="TabBridges" class="tab-inactive pb-2 font-semibold">🌉 Pontes & Agregadores</button>
        </div>

        <div id="lendingSection">
            <div class="terminal-card p-4 mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="text-xs text-gray-400">Rede</label>
                    <select id="filterNetwork" multiple size="2" class="w-full bg-gray-900 border border-gray-700 rounded-md text-sm p-2">
                        <option value="Ethereum">Ethereum</option><option value="Arbitrum">Arbitrum</option>
                        <option value="Optimism">Optimism</option><option value="Base">Base</option>
                        <option value="Polygon">Polygon</option><option value="BNB Chain">BNB Chain</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400">Stablecoin</label>
                    <select id="filterStablecoin" multiple size="2" class="w-full bg-gray-900 border border-gray-700 rounded-md text-sm p-2">
                        <option value="USDT">USDT</option><option value="USDC">USDC</option><option value="DAI">DAI</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="negativeOnlyFilter" class="accent-emerald-500"> Apenas Net Borrow Negativo</label>
                </div>
                <div>
                    <label class="text-xs text-gray-400">Ordenar</label>
                    <select id="sortBy" class="w-full bg-gray-900 border border-gray-700 rounded-md text-sm p-2">
                        <option value="reward">Maior recompensa</option>
                        <option value="net" selected>Menor custo real</option>
                    </select>
                </div>
            </div>

            <div class="terminal-card overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-900/80 text-gray-300">
                        <tr><th class="px-4 py-3">Protocolo</th><th class="px-4 py-3">Rede</th><th class="px-4 py-3">Stable</th>
                        <th class="px-4 py-3">Borrow</th><th class="px-4 py-3">Reward</th><th class="px-4 py-3">Net APY</th>
                        <th class="px-4 py-3">Risk</th></tr>
                    </thead>
                    <tbody id="opportunityTableBody"><tr><td colspan="7" class="text-center py-8">Carregando...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="bridgesSection" class="hidden">
            <div class="terminal-card p-4 mb-6">
                <p class="text-center text-gray-400 py-8">Seção de pontes e agregadores em desenvolvimento</p>
            </div>
        </div>
    </div>

    <div id="protocolModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-bg">
        <div class="bg-gray-900 rounded-xl max-w-2xl w-full p-6">
            <div class="flex justify-between mb-4"><h2 id="modalTitle" class="text-xl font-bold text-emerald-300">Detalhes</h2><button id="closeModalBtn" class="text-white text-2xl">&times;</button></div>
            <canvas id="rateChart" height="200"></canvas>
            <div class="mt-4" id="modalDetails"></div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50"></div>

    <script>
        const PROTOCOLS = ["Aave", "Compound", "Venus", "Morpho"];
        const NETWORKS = ["Ethereum", "Arbitrum", "Optimism", "Base", "Polygon"];
        const STABLECOINS = ["USDT", "USDC", "DAI"];
        let allData = [];
        
        function generateData() {
            const data = [];
            for(let p of PROTOCOLS) {
                for(let net of NETWORKS) {
                    for(let stable of STABLECOINS) {
                        if(Math.random() > 0.5) continue;
                        const borrow = (Math.random() * 12 + 2).toFixed(2);
                        const reward = (Math.random() * 8).toFixed(2);
                        const net = (borrow - reward).toFixed(2);
                        data.push({ protocol: p, network: net, stablecoin: stable, borrowApy: parseFloat(borrow), rewardApy: parseFloat(reward), netBorrowApy: parseFloat(net), riskScore: Math.random() > 0.7 ? "Alto" : (Math.random() > 0.5 ? "Médio" : "Baixo") });
                    }
                }
            }
            return data;
        }
        
        function renderTable() {
            const tbody = document.getElementById("opportunityTableBody");
            const negativeOnly = document.getElementById("negativeOnlyFilter").checked;
            let filtered = [...allData];
            if(negativeOnly) filtered = filtered.filter(o => o.netBorrowApy < 0);
            if(filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8">Nenhuma oportunidade</td></tr>'; return; }
            tbody.innerHTML = filtered.map(opp => `<tr class="table-row border-b border-gray-800/60" data-protocol='${JSON.stringify(opp)}'>
                <td class="px-4 py-3 text-cyan-300">${opp.protocol}</td>
                <td class="px-4 py-3">${opp.network}</td>
                <td class="px-4 py-3">${opp.stablecoin}</td>
                <td class="px-4 py-3">${opp.borrowApy}%</td>
                <td class="px-4 py-3 text-green-300">+${opp.rewardApy}%</td>
                <td class="px-4 py-3 ${opp.netBorrowApy < 0 ? 'text-emerald-400 font-bold' : 'text-yellow-300'}">${opp.netBorrowApy}%</td>
                <td class="px-4 py-3"><span class="px-2 py-0.5 rounded text-xs font-bold risk-${opp.riskScore === 'Baixo' ? 'low' : (opp.riskScore === 'Médio' ? 'medium' : 'high')}">${opp.riskScore}</span></td>
            </tr>`).join("");
            document.querySelectorAll(".table-row").forEach(row => {
                row.addEventListener("click", () => { alert("Detalhes do protocolo (demo)"); });
            });
        }
        
        allData = generateData();
        renderTable();
        
        document.getElementById("negativeOnlyFilter").addEventListener("change", renderTable);
        document.getElementById("exportCsvBtn").addEventListener("click", () => { alert("CSV exportado (demo)"); });
        document.getElementById("proModeBtn").addEventListener("click", () => { alert("Modo Pro em breve"); });
        document.getElementById("closeModalBtn").addEventListener("click", () => { document.getElementById("protocolModal").classList.add("hidden"); });
        
        setInterval(() => {
            allData = generateData();
            renderTable();
        }, 30000);
    </script>
</body>
</html>
